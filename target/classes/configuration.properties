# CONFIGURACIÓN EXTERNA - PROPIEDADES DE LA APLICACIÓN
# Este archivo contiene configuraciones que pueden ser modificadas
# sin necesidad de recompilar la aplicación

# CONFIGURACIÓN DE JWT
jwt.secret.key=ms-auth-secret-key-2026
jwt.expiration.hours=1

# CONFIGURACIÓN DE BASE DE DATOS
# Estas propiedades pueden ser sobrescritas por variables de entorno
db.host=localhost
db.port=3306
db.name=auth_db
db.username=root
db.password=

# CONFIGURACIÓN DEL SERVIDOR
server.host=0.0.0.0
server.port=8080

# CONFIGURACIÓN DE CORS
cors.allowed.origins=http://localhost:3000,http://localhost:4200
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed.headers=*

# CONFIGURACIÓN DE LÍMITES
request.max.size=10MB
file.max.size=5MB
