# INFORMACIÓN GENERAL DE LA APLICACIÓN
spring.application.name=ms-auth

# CONFIGURACIÓN DEL SERVIDOR
server.port=8080

# DATASOURCE MYSQL (LARAGON)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/users_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACIÓN JPA PARA MYSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CONFIGURACIÓN DE SEGURIDAD - PASSWORD
security.password.min-length=8
security.password.max-length=64
security.password.require-uppercase=true
security.password.require-lowercase=true
security.password.require-digit=true
security.password.require-special=true

# CONFIGURACIÓN SWAGGER/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# CONFIGURACIÓN JWT
# Clave secreta fija para firmar tokens JWT (Base64 encoded)
# Esta clave debe ser la misma en todos los entornos (Docker, producción, etc.)
jwt.secret=bXlTZWNyZXRLZXlGb3JKV1RUaGF0SXNBdExlYXN0MjU2Qml0c0xvbmdGb3JIUzI1NkFsZ29yaXRobUFuZFNob3VsZEJlQmFzZTY0RW5jb2RlZA==

# CONFIGURACIÓN CORS
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8081
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# LOGGING
logging.level.duoc.fs3.ms_auth=DEBUG
logging.level.org.springframework.security=DEBUG
